name: NexusAI CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate-project:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Android project structure
        run: |
          echo "=== Verifying project structure ==="
          MISSING=0
          for FILE in \
            android/app/build.gradle \
            android/app/src/main/AndroidManifest.xml \
            android/app/src/main/java/com/domwood/nexusai/MainActivity.java \
            android/app/src/main/java/com/domwood/nexusai/ChatActivity.java \
            android/app/src/main/java/com/domwood/nexusai/NeuralActivity.java \
            android/app/src/main/java/com/domwood/nexusai/NotesActivity.java \
            android/app/src/main/java/com/domwood/nexusai/NoteEditorActivity.java \
            android/app/src/main/java/com/domwood/nexusai/SettingsActivity.java \
            android/app/src/main/java/com/domwood/nexusai/NexusApp.java \
            android/app/src/main/java/com/domwood/nexusai/views/MatrixRainView.java \
            android/app/src/main/java/com/domwood/nexusai/views/NeuralNetworkView.java \
            android/app/src/main/res/layout/activity_main.xml \
            android/app/src/main/res/layout/activity_chat.xml \
            android/app/src/main/res/layout/activity_neural.xml \
            android/app/src/main/res/layout/activity_notes.xml \
            android/app/src/main/res/layout/activity_note_editor.xml \
            android/app/src/main/res/layout/activity_settings.xml \
            android/app/src/main/res/values/colors.xml \
            android/app/src/main/res/values/styles.xml \
            android/app/src/main/res/values/strings.xml; do
            if [ -f "$FILE" ]; then
              echo "  OK  $FILE"
            else
              echo "  MISS $FILE"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING file(s) missing!"
            exit 1
          fi
          echo "All files present."

      - name: Check for no rogue files at root
        run: |
          ROGUE=$(find . -maxdepth 1 -name "*.java" -type f | wc -l)
          if [ "$ROGUE" -gt 0 ]; then
            echo "WARNING: Found $ROGUE Java file(s) at repo root (should be in android/):"
            find . -maxdepth 1 -name "*.java" -type f
          else
            echo "OK: No rogue Java files at repo root."
          fi

      - name: Verify XML well-formedness
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils 2>/dev/null
          echo "=== Checking XML files ==="
          ERRORS=0
          for XML in $(find android/app/src/main/res -name "*.xml"); do
            if xmllint --noout "$XML" 2>/dev/null; then
              echo "  OK  $XML"
            else
              echo "  ERR $XML"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "ERROR: $ERRORS XML file(s) have syntax errors!"
            exit 1
          fi
          echo "All XML files valid."

      - name: Check for hardcoded secrets
        run: |
          echo "=== Scanning for secrets ==="
          FOUND=0
          if rg -i "password\s*=\s*\"[^\"]+\"" --type java android/ 2>/dev/null; then
            echo "WARNING: Possible hardcoded password!"
            FOUND=1
          fi
          if rg -i "api[_-]?key\s*=\s*\"[^\"]+\"" --type java android/ 2>/dev/null; then
            echo "WARNING: Possible hardcoded API key!"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "OK: No hardcoded secrets found."
          fi

      - name: Source line count
        run: |
          LINES=$(find android/app/src/main/java -name "*.java" -exec cat {} + | wc -l)
          echo "Total Java source lines: $LINES"
          FILES=$(find android/app/src/main/java -name "*.java" | wc -l)
          echo "Total Java files: $FILES"
