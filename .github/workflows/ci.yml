name: NexusAI CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compile-and-validate:
    name: Compile & Validate Java Sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Create Android desktop stubs
        run: |
          mkdir -p stubs/android/content stubs/android/util stubs/com/nexusai/assistant/ai

          cat > stubs/android/content/Context.java << 'EOF'
          package android.content;
          public abstract class Context {
              public static final int MODE_PRIVATE = 0;
              public abstract SharedPreferences getSharedPreferences(String name, int mode);
              public abstract Context getApplicationContext();
          }
          EOF

          cat > stubs/android/content/SharedPreferences.java << 'EOF'
          package android.content;
          public interface SharedPreferences {
              String getString(String key, String defValue);
              boolean getBoolean(String key, boolean defValue);
              int getInt(String key, int defValue);
              Editor edit();
              interface Editor {
                  Editor putString(String key, String value);
                  Editor putBoolean(String key, boolean value);
                  Editor putInt(String key, int value);
                  boolean commit();
                  void apply();
              }
          }
          EOF

          cat > stubs/android/util/Log.java << 'EOF'
          package android.util;
          public class Log {
              public static int i(String tag, String msg) { System.out.println("[" + tag + "] " + msg); return 0; }
              public static int e(String tag, String msg) { System.err.println("[" + tag + "] ERROR: " + msg); return 0; }
              public static int e(String tag, String msg, Throwable tr) { System.err.println("[" + tag + "] ERROR: " + msg); tr.printStackTrace(); return 0; }
              public static int w(String tag, String msg) { System.out.println("[" + tag + "] WARN: " + msg); return 0; }
              public static int d(String tag, String msg) { return 0; }
              public static int v(String tag, String msg) { return 0; }
          }
          EOF

          cat > stubs/com/nexusai/assistant/ai/AICore.java << 'EOF'
          package com.nexusai.assistant.ai;
          public class AICore {
              public void processResponse(String input, java.util.Map<String, Object> params) {}
          }
          EOF

          echo "Android stubs created in stubs/"

      - name: Compile all Java sources
        run: |
          mkdir -p bin

          # Collect root Java files
          find . -maxdepth 1 -name "*.java" -print0 > sources.txt

          # Collect stub Java files (recursively)
          find stubs/ -name "*.java" -print0 >> sources.txt

          # Convert null-delimited to newline-delimited for javac @file
          tr '\0' '\n' < sources.txt > sources_nl.txt

          echo "Compiling files:"
          cat sources_nl.txt
          echo "---"

          javac -sourcepath ".:stubs" -d bin @sources_nl.txt
          echo "Compilation successful!"
          rm -f sources.txt sources_nl.txt

      - name: Validate class output
        run: |
          CLASS_COUNT=$(find bin -name "*.class" | wc -l)
          echo "Generated $CLASS_COUNT class files"
          if [ "$CLASS_COUNT" -lt 6 ]; then
            echo "ERROR: Expected at least 6 class files, got $CLASS_COUNT"
            exit 1
          fi

      - name: Check for critical classes
        run: |
          echo "Verifying critical classes exist..."
          PKG="bin/com/nexusai/assistant/ai/advanced"
          for CLASS in AdvancedLearningEngine TransformerAttention ActiveLearningSystem NeuralKnowledgeGraph TransferLearningManager WebStudyEngine; do
            if [ -f "${PKG}/${CLASS}.class" ]; then
              echo "  OK ${CLASS}.class"
            else
              echo "  FAIL ${CLASS}.class MISSING"
              exit 1
            fi
          done

      - name: Verify shutdown method
        run: |
          COUNT=$(javap -p bin/com/nexusai/assistant/ai/advanced/AdvancedLearningEngine.class 2>/dev/null | grep -c "shutdown")
          echo "shutdown() count: $COUNT"
          if [ "$COUNT" -eq 1 ]; then
            echo "  OK: Exactly one shutdown() method"
          else
            echo "  FAIL: Expected 1 shutdown(), got $COUNT"
            exit 1
          fi

      - name: Verify scoring methods in TransferLearningManager
        run: |
          for METHOD in calculateCulturalFit calculateConversationalFit calculateLanguageFit calculateEmotionalFit calculateReasoningFit; do
            if javap -p bin/com/nexusai/assistant/ai/advanced/TransferLearningManager.class 2>/dev/null | grep -q "$METHOD"; then
              echo "  OK $METHOD"
            else
              echo "  FAIL $METHOD MISSING"
              exit 1
            fi
          done

      - name: Verify WebStudyEngine methods
        run: |
          for METHOD in extractKnowledgeFacts fetchWebPage startStudying addStudyTask; do
            if javap -p bin/com/nexusai/assistant/ai/advanced/WebStudyEngine.class 2>/dev/null | grep -q "$METHOD"; then
              echo "  OK $METHOD"
            else
              echo "  FAIL $METHOD MISSING"
              exit 1
            fi
          done

  security-scan:
    name: Security & Quality Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          if rg -i "password\s*=\s*\"[^\"]+\"" --type java . 2>/dev/null; then
            echo "WARNING: Possible hardcoded password found"
          fi
          if rg -i "api[_-]?key\s*=\s*\"[^\"]+\"" --type java . 2>/dev/null; then
            echo "WARNING: Possible hardcoded API key found"
          fi
          echo "Secret scan complete"

      - name: Source line count
        run: |
          LINES=$(find . -maxdepth 1 -name "*.java" -exec cat {} + | wc -l)
          echo "Total Java source lines: $LINES"
          FILES=$(find . -maxdepth 1 -name "*.java" | wc -l)
          echo "Total Java files: $FILES"
