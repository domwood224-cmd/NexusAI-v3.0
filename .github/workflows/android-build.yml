name: NexusAI Android APK Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android/**'
      - '*.java'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: |
          cd android
          chmod +x gradlew || true
          if [ ! -f gradlew ]; then
            echo "No gradlew found, ensuring gradle wrapper exists..."
            gradle wrapper --gradle-version 8.2.1
          fi

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace || gradle assembleDebug --stacktrace

      - name: Verify APK exists
        run: |
          APK=$(find android/app/build/outputs/apk/debug/ -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found in expected location"
            find android/app/build/outputs/ -type f 2>/dev/null || echo "No outputs directory"
            exit 1
          fi
          echo "APK built successfully: $APK"
          SIZE=$(du -h "$APK" | cut -f1)
          echo "APK size: $SIZE"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusAI-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  build-release:
    name: Build Android Release APK (Signed)
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Release Keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/release-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias nexusai \
            -storepass nexusai123 \
            -keypass nexusai123 \
            -dname "CN=NexusAI, OU=Dev, O=NexusAI, L=Unknown, ST=Unknown, C=US"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Signed Release APK
        env:
          RELEASE_KEYSTORE_PATH: /tmp/release-keystore.jks
          KEYSTORE_PASSWORD: nexusai123
          KEY_ALIAS: nexusai
          KEY_PASSWORD: nexusai123
        run: |
          cd android
          chmod +x gradlew || true
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.2.1
          fi
          ./gradlew assembleRelease --stacktrace || gradle assembleRelease --stacktrace

      - name: Verify Signed APK
        run: |
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: Signed APK not found"
            exit 1
          fi
          echo "APK built successfully: $APK"
          SIZE=$(du -h "$APK" | cut -f1)
          echo "APK size: $SIZE"
          # Verify the APK is signed
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner verify "$APK" && echo "APK signature verified" || echo "Warning: signature verification skipped"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusAI-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" 2>/dev/null | head -1)
          APK_NAME=$(basename "$APK")
          TAG="v6.1.0"
          gh release delete "$TAG" 2>/dev/null || true
          gh release create "$TAG" "$APK" \
            --title "NexusAI v6.1.0" \
            --notes "NexusAI v6.1.0 - Root Cause Fix

          Removed Material Components library entirely
          All Button tags fully qualified as android.widget.Button
          Fixed NotesActivity NPE in onResume
          Fixed ChatActivity thread safety
          Fixed NexusApp crash handler
          Removed Toast from crash handler thread
          Replaced deprecated Thread.stop with Process.killProcess

          Install: Download the APK below and install on your Android device." \
            --prerelease 2>&1 || echo "Release creation had issues, APK is still available as artifact"
